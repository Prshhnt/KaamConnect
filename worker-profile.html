<!doctype html>
<html lang="en"><head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KaamConnect | My Worker Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./css/style.css" /><link rel="stylesheet" href="./css/dashboard.css" />
<script src="https://unpkg.com/phosphor-icons" defer></script></head>
<body class="dashboard-shell"><a href="#mainContent" class="skip-link">Skip to content</a>
<div id="sidebarMount"></div><div id="overlayMount"></div><div id="topbarMount"></div>
<main id="mainContent" class="dashboard-main" tabindex="-1">
  <section class="data-table-wrapper" style="padding:18px">
    <h2 class="section-title" style="margin-bottom:12px">Profile Details</h2>
    <form id="profileForm" class="page-grid" style="max-width:900px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <input class="form-control" id="name" placeholder="Full Name" required />
        <input class="form-control" id="phone" placeholder="Phone" required />
        <input class="form-control" id="city" placeholder="City" />
        <input class="form-control" id="category" placeholder="Category" />
        <input class="form-control" id="experience" placeholder="Experience (years)" type="number" min="0" step="1" />
        <input class="form-control" id="hourlyRate" placeholder="Hourly rate" type="number" min="0" step="1" />
      </div>
      <textarea class="form-control" id="skills" rows="2" placeholder="Skills (comma separated)"></textarea>
      <textarea class="form-control" id="bio" rows="4" placeholder="Short bio"></textarea>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" type="submit" id="saveBtn">Save Profile</button>
        <a class="btn btn-outline" href="worker-profile-public.html">Preview Public Profile</a>
      </div>
    </form>
  </section>
</main>
<script type="module">
import { db, DB_ID } from "./js/appwrite.js";
import { Query, ID } from "./js/appwrite.js";
import { initDashboard, showToast } from "./js/dashboard.js";

let shellData;

function fillForm(profile) {
  ["name", "phone", "city", "category", "experience", "hourlyRate"].forEach((id) => {
    document.getElementById(id).value = profile?.[id] ?? "";
  });
  document.getElementById("hourlyRate").value = profile?.rate ?? profile?.hourlyRate ?? "";
  document.getElementById("bio").value = profile?.about || profile?.bio || "";
  const skills = Array.isArray(profile?.skills) ? profile.skills.join(", ") : (profile?.skills || "");
  document.getElementById("skills").value = skills;
}

function normalizeSkills(value) {
  return String(value || "")
    .split(",")
    .map((item) => item.trim())
    .filter(Boolean)
    .join(", ")
    .slice(0, 255);
}

async function loadPage() {
  shellData = await initDashboard("worker", "My Profile");
  if (!shellData) return;
  fillForm(shellData.profile || {});

  document.getElementById("profileForm").addEventListener("submit", async (event) => {
    event.preventDefault();
    const saveBtn = document.getElementById("saveBtn");
    saveBtn.classList.add("btn-loading");

    const payload = {
      name: document.getElementById("name").value.trim(),
      phone: document.getElementById("phone").value.trim(),
      city: document.getElementById("city").value.trim(),
      category: document.getElementById("category").value.trim(),
      experience: Number(document.getElementById("experience").value || 0),
      rate: Number(document.getElementById("hourlyRate").value || 0),
      about: document.getElementById("bio").value.trim(),
      skills: normalizeSkills(document.getElementById("skills").value)
    };

    try {
      if (shellData.profile?.$id) {
        await db.updateDocument(DB_ID, "workers", shellData.profile.$id, payload);
      }
      showToast("Profile updated successfully");
    } catch {
      showToast("Could not update profile.", "error");
    } finally {
      saveBtn.classList.remove("btn-loading");
    }
  });
}

loadPage();
</script>
</body></html>
