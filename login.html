<!DOCTYPE html>
<html lang="en" class="page-enter">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - KaamConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Hind:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card" style="width:min(520px,100%);padding:24px">
      <div class="card auth-header-card" style="padding:16px">
        <h1 class="auth-logo"><i class="ph ph-toolbox"></i> KaamConnect</h1>
        <h2 class="auth-title" data-i18n="login.title">Welcome Back</h2>
        <p class="auth-subtitle">Sign in to continue to your dashboard.</p>
      </div>

      <div class="tab-toggle" id="roleToggle">
        <button class="active touch-target" data-role="worker"><i class="ph ph-hard-hat"></i> Worker</button>
        <button class="touch-target" data-role="employer"><i class="ph ph-buildings"></i> Employer</button>
      </div>

      <div class="input-group">
        <label class="input-label" for="emailInput" data-i18n="login.email">Email Address</label>
        <div class="input-row">
          <span class="input-icon"><i class="ph ph-envelope-simple"></i></span>
          <input class="input" id="emailInput" name="email" autocomplete="email" inputmode="email" placeholder="name@example.com">
        </div>
        <p class="field-error" id="emailError"></p>
      </div>

      <div class="input-group">
        <label class="input-label" for="passwordInput" data-i18n="login.password">Password</label>
        <div class="input-row">
          <span class="input-icon"><i class="ph ph-lock-key"></i></span>
          <input class="input" id="passwordInput" name="current-password" autocomplete="current-password" type="password" placeholder="••••••••">
          <button type="button" class="input-action" id="showPasswordBtn" data-i18n="login.show">Show</button>
        </div>
        <p class="field-error" id="passwordError"></p>
      </div>

      <div class="auth-actions">
        <button class="btn btn-primary touch-target" id="loginBtn"><i class="ph ph-sign-in"></i> <span data-i18n="login.button">Login</span></button>
        <button class="btn btn-outline touch-target" id="googleLoginBtn"><i class="ph ph-globe"></i> Continue with Google</button>
      </div>

      <div class="auth-meta" style="justify-content:center">
        <a href="register.html" style="font-weight:700;color:var(--secondary)">Don't have an account? Register →</a>
      </div>
    </section>
  </main>

  <script type="module">
    import { initCommonUI, showToast, showLoading, hideLoading } from "./main.js";
    import { loginWithEmailPassword, loginWithGoogle } from "./auth.js";

    const roleToggle = document.getElementById("roleToggle");
    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const loginBtn = document.getElementById("loginBtn");
    const emailError = document.getElementById("emailError");
    const passwordError = document.getElementById("passwordError");
    const showPasswordBtn = document.getElementById("showPasswordBtn");
    const googleLoginBtn = document.getElementById("googleLoginBtn");

    let selectedRole = "worker";

    function setError(node, message) {
      node.textContent = message || "";
      node.classList.toggle("visible", Boolean(message));
    }

    roleToggle.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-role]");
      if (!button) {
        return;
      }
      roleToggle.querySelectorAll("button").forEach((node) => node.classList.remove("active"));
      button.classList.add("active");
      selectedRole = button.dataset.role;
    });

    showPasswordBtn.addEventListener("click", () => {
      const visible = passwordInput.type === "text";
      passwordInput.type = visible ? "password" : "text";
      showPasswordBtn.textContent = visible ? "Show" : "Hide";
    });

    loginBtn.addEventListener("click", async () => {
      setError(emailError, "");
      setError(passwordError, "");

      showLoading("Signing you in...");
      const result = await loginWithEmailPassword(emailInput.value.trim(), passwordInput.value);
      hideLoading();

      if (!result.ok) {
        setError(emailError, result.errors.email);
        setError(passwordError, result.errors.password);
        if (!result.errors.email && !result.errors.password) {
          showToast("Something went wrong. Please try again.", "error");
        }
        return;
      }

      showToast("Login successful", "success");
      window.location.href = selectedRole === "worker" ? "worker-dashboard.html" : "employer-dashboard.html";
    });

    googleLoginBtn.addEventListener("click", async () => {
      try {
        const target = selectedRole === "worker" ? "worker-dashboard.html" : "employer-dashboard.html";
        const successUrl = new URL(target, window.location.href).toString();
        const failureUrl = new URL("login.html", window.location.href).toString();
        await loginWithGoogle(successUrl, failureUrl);
      } catch {
        showToast("Google sign-in could not start. Please try again.", "error");
      }
    });

    initCommonUI();
  </script>
</body>
</html>
