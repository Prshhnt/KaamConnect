<!DOCTYPE html>
<html lang="en" class="page-enter">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employer Dashboard - KaamConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Hind:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="container section">
    <h1>Hello, Mehta House</h1>

    <button class="card" id="postJobBtn" style="width:100%;text-align:left;background:var(--primary);color:#fff;border:none">
      <h2 style="color:#fff"><i class="ph ph-plus-circle"></i> Post a New Job</h2>
      <p style="color:#fff">Takes just 2 minutes</p>
    </button>

    <section class="stats-grid" style="margin-top:12px">
      <article class="card stat-card"><p class="stat-value">2</p><p>Active Jobs</p></article>
      <article class="card stat-card"><p class="stat-value">5</p><p>Pending Applic.</p></article>
      <article class="card stat-card"><p class="stat-value">8</p><p>Workers Hired</p></article>
    </section>

    <section style="margin-top:14px">
      <h2><i class="ph ph-briefcase"></i> My Posted Jobs</h2>
      <div id="postedJobs" class="dashboard-grid" style="margin-top:10px"></div>
    </section>

    <section class="card" style="margin-top:14px">
      <h2>Electrician Job — 3 Applied</h2>
      <div id="applicantsList" class="dashboard-grid" style="margin-top:10px"></div>
    </section>

    <div class="spacer-bottom-nav"></div>
  </main>

  <div class="sheet" id="postJobSheet">
    <div class="sheet-backdrop"></div>
    <div class="sheet-panel">
      <div class="drag-handle"></div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3>Post a New Job</h3>
        <button class="icon-btn touch-target" id="closePostSheet"><i class="ph ph-x"></i></button>
      </div>

      <div style="margin-top:12px">
        <label class="input-label">What kind of worker do you need?</label>
        <div class="category-grid" id="jobCategoryGrid"></div>
      </div>

      <div class="input-group" style="margin-top:12px">
        <label class="input-label"><i class="ph ph-map-pin"></i> Where is the work?</label>
        <input class="input" id="jobCityInput" placeholder="Enter area / locality">
        <p class="field-error" id="jobCityError"></p>
      </div>

      <div class="input-group" style="margin-top:12px">
        <label class="input-label"><i class="ph ph-currency-inr"></i> How much will you pay per day?</label>
        <input class="input" id="jobRateInput" inputmode="numeric" value="500">
        <p class="field-error" id="jobRateError"></p>
      </div>

      <div style="margin-top:12px">
        <label class="input-label"><i class="ph ph-clock"></i> How long is the work?</label>
        <div class="filter-chips" id="durationChips">
          <button class="chip touch-target active" data-duration="1 Day">1 Day</button>
          <button class="chip touch-target" data-duration="2-3 Days">2-3 Days</button>
          <button class="chip touch-target" data-duration="1 Week">1 Week</button>
          <button class="chip touch-target" data-duration="Ongoing">Ongoing</button>
        </div>
      </div>

      <details style="margin-top:10px">
        <summary>Add more details ▼</summary>
        <textarea class="input" id="jobDetailsInput" style="border-radius:16px;min-height:100px;margin-top:8px" placeholder="Optional details"></textarea>
      </details>

      <button class="btn btn-primary touch-target" id="postNowBtn" style="width:100%;margin-top:14px"><i class="ph ph-rocket-launch"></i> Post Job Now</button>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="employer-dashboard.html" class="bottom-tab active"><i class="ph ph-house"></i><span>Home</span></a>
    <a href="search.html" class="bottom-tab"><i class="ph ph-magnifying-glass"></i><span>Search</span></a>
    <a href="employer-dashboard.html" class="bottom-tab"><i class="ph ph-briefcase"></i><span>Jobs</span></a>
    <a href="login.html" class="bottom-tab"><i class="ph ph-user"></i><span>Profile</span></a>
  </nav>

  <script type="module">
    import { initCommonUI, categoryMeta, initBottomSheet, showToast, showSuccessOverlay, showEmptyState, renderSkeletonCards } from "./main.js";
    import { fetchJobs, account } from "./appwrite.js";

    let postedJobs = [];
    let applicants = [];

    const postedJobsNode = document.getElementById("postedJobs");
    const applicantsListNode = document.getElementById("applicantsList");

    async function loadEmployerData() {
      try {
        const user = await account.get();
        
        // Fetch jobs posted by this employer
        postedJobs = await fetchJobs({ employerId: user.$id });
        
        renderPostedJobs();
        renderApplicants();
      } catch (error) {
        console.error("Failed to load employer data:", error);
        showEmptyState({
          container: postedJobsNode,
          title: "Unable to load jobs",
          message: "Please check your connection"
        });
      }
    }

    function renderPostedJobs() {
      if (!postedJobs.length) {
        showEmptyState({
          container: postedJobsNode,
          title: "No jobs posted yet",
          message: "Click 'Post a New Job' to get started",
          buttonText: "Post a Job",
          onAction: () => document.getElementById("postJobBtn").click()
        });
        return;
      }

      postedJobsNode.innerHTML = postedJobs.map((job, index) => `
        <article class="card">
          <h3>${job.title} · <span class="badge ${job.status || 'open'}">${(job.status || 'open').toUpperCase()}</span></h3>
          <p>${job.applicationsCount || 0} people applied · Posted ${getRelativeTime(job.createdAt)}</p>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px">
            <button class="btn btn-outline touch-target" data-view-job="${index}">See Applicants</button>
            <button class="btn btn-outline touch-target" data-close-job="${index}">Close Job</button>
          </div>
        </article>
      `).join("");

      document.querySelectorAll("[data-close-job]").forEach((button) => {
        button.addEventListener("click", () => {
          const index = button.getAttribute("data-close-job");
          const yes = confirm("Are you sure you want to close this job?");
          if (yes) {
            showToast("Job closed", "success");
            // TODO: Update job status in database
          }
        });
      });
    }

    function renderApplicants() {
      if (!applicants.length) {
        applicantsListNode.innerHTML = '<article class="card"><p style="text-align:center;color:#999">No applicants yet</p></article>';
        return;
      }

      applicantsListNode.innerHTML = applicants.map((item, index) => `
        <article class="card">
          <h3>${item.name}</h3>
          <p><i class="ph ph-star"></i> ${item.rating} · ${item.reviews} reviews</p>
          <p>${item.experience || item.exp} years · ₹${item.rate}/day · <i class="ph ph-map-pin"></i> ${item.distance || 0} km away</p>
          <div style="display:grid;gap:8px;margin-top:10px">
            <button class="btn btn-outline touch-target"><i class="ph ph-eye"></i> View Profile</button>
            <button class="btn btn-primary touch-target" data-accept="${index}"><i class="ph ph-check-circle"></i> Accept & Get Number</button>
            <button class="btn btn-outline touch-target"><i class="ph ph-x-circle"></i> Reject</button>
            <a href="tel:${item.phone || "9876543210"}" class="btn btn-primary touch-target" data-call="${index}" style="display:none"><i class="ph ph-phone"></i> Call Now</a>
          </div>
        </article>
      `).join("");

      document.querySelectorAll("[data-accept]").forEach((button) => {
        button.addEventListener("click", () => {
          const id = button.getAttribute("data-accept");
          const callButton = document.querySelector(`[data-call='${id}']`);
          if (callButton) {
            callButton.style.display = "inline-flex";
          }
          button.innerHTML = '<i class="ph ph-check-circle"></i> Accepted';
          button.disabled = true;
          showToast("Worker accepted. Phone unlocked.", "success");
        });
      });
    }

    function getRelativeTime(isoDate) {
      const ms = Date.now() - new Date(isoDate).getTime();
      const days = Math.floor(ms / (24 * 60 * 60 * 1000));
      if (days > 0) return `${days} day${days > 1 ? 's' : ''} ago`;
      const hours = Math.floor(ms / (60 * 60 * 1000));
      if (hours > 0) return `${hours} hour${hours > 1 ? 's' : ''} ago`;
      return 'just now';
    }

    const jobCategoryGrid = document.getElementById("jobCategoryGrid");
    let selectedCategory = "";
    let selectedDuration = "1 Day";

    Object.entries(categoryMeta).forEach(([key, value]) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "category-card touch-target";
      button.style.background = value.color;
      button.innerHTML = `<span class='emoji'><i class='${value.icon}'></i></span><span>${value.label}</span>`;
      button.addEventListener("click", () => {
        selectedCategory = key;
        [...jobCategoryGrid.children].forEach((node) => node.style.borderColor = "transparent");
        button.style.borderColor = "var(--primary)";
      });
      jobCategoryGrid.appendChild(button);
    });

    document.getElementById("durationChips").addEventListener("click", (event) => {
      const chip = event.target.closest("[data-duration]");
      if (!chip) {
        return;
      }
      selectedDuration = chip.dataset.duration;
      document.querySelectorAll("#durationChips .chip").forEach((item) => item.classList.remove("active"));
      chip.classList.add("active");
    });

    document.getElementById("postNowBtn").addEventListener("click", () => {
      const city = document.getElementById("jobCityInput").value.trim();
      const rate = Number(document.getElementById("jobRateInput").value || 0);
      document.getElementById("jobCityError").classList.remove("visible");
      document.getElementById("jobRateError").classList.remove("visible");

      let invalid = false;
      if (!selectedCategory) {
        showToast("Please choose worker type", "warning");
        invalid = true;
      }
      if (city.length < 2) {
        const node = document.getElementById("jobCityError");
        node.textContent = "Please enter work area";
        node.classList.add("visible");
        invalid = true;
      }
      if (!rate || rate < 100) {
        const node = document.getElementById("jobRateError");
        node.textContent = "Please enter daily wage";
        node.classList.add("visible");
        invalid = true;
      }
      if (invalid) {
        return;
      }

      showSuccessOverlay("Job Posted!");
      showToast(`Workers will contact you soon for ${selectedDuration}`, "success");
      document.getElementById("postJobSheet").classList.remove("open");
    });

    // Load employer data
    loadEmployerData();
    initBottomSheet("#postJobBtn", "#postJobSheet", "#closePostSheet");
    initCommonUI();
  </script>
</body>
</html>
