<!DOCTYPE html>
<html lang="en" class="page-enter">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search - KaamConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Hind:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="container section">
    <div class="top-bar">
      <button class="btn btn-outline touch-target" onclick="history.back()">← <span data-i18n="common.back">Back</span></button>
      <div class="search-pill"><i class="ph ph-magnifying-glass"></i><span data-i18n="search.input">Search workers...</span></div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="lang-btn touch-target" data-language-switcher>
          <i class="ph ph-globe"></i> <span class="lang-label" data-lang-label>English</span>
        </button>
        <button class="btn btn-outline touch-target" id="filterBtn" data-i18n="search.filter">Filter</button>
      </div>
    </div>

    <div class="tab-toggle" id="modeToggle">
      <button class="active touch-target" data-mode="workers"><i class="ph ph-hard-hat"></i> <span data-i18n="search.findWorkers">Find Workers</span></button>
      <button class="touch-target" data-mode="jobs"><span data-i18n="search.findJobs">Find Jobs</span></button>
    </div>

    <section class="card" style="margin-top:12px">
      <div style="display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr auto;gap:10px;align-items:end">
        <div class="input-group" style="gap:6px">
          <label class="input-label">City</label>
          <input class="input" id="quickCityInput" placeholder="e.g. Saket">
        </div>
        <div class="input-group" style="gap:6px">
          <label class="input-label">Category</label>
          <select class="input" id="quickCategoryInput">
            <option value="">All categories</option>
          </select>
        </div>
        <div class="input-group" style="gap:6px">
          <label class="input-label">Min Rating</label>
          <select class="input" id="quickRatingInput">
            <option value="0">Any</option>
            <option value="3">3+</option>
            <option value="4">4+</option>
            <option value="4.5">4.5+</option>
          </select>
        </div>
        <div class="input-group" style="gap:6px">
          <label class="input-label">Availability</label>
          <select class="input" id="quickAvailabilityInput">
            <option value="all">All</option>
            <option value="available">Available only</option>
          </select>
        </div>
        <button class="btn btn-primary touch-target" id="quickApplyBtn">Apply</button>
      </div>
    </section>

    <section class="card" id="locationBanner" style="margin-top:12px;background:var(--warning-light)">
      <h3><i class="ph ph-map-pin"></i> <span data-i18n="search.locationBanner">Allow location for better results nearby</span></h3>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
        <button class="btn btn-primary touch-target" id="allowLocationBtn" data-i18n="search.allowLocation">Allow Location Access</button>
        <button class="btn btn-outline touch-target" id="enterCityBtn"><span data-i18n="search.enterCity">Enter City</span> <i class="ph ph-arrow-right"></i></button>
      </div>
    </section>

    <section id="results" class="dashboard-grid" style="margin-top:14px"></section>
  </main>

  <div class="sheet" id="filterSheet">
    <div class="sheet-backdrop"></div>
    <div class="sheet-panel">
      <div class="drag-handle"></div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3 data-i18n="search.filterWorkers">Filter Workers</h3>
        <button class="icon-btn touch-target" id="closeFilterBtn"><i class="ph ph-x"></i></button>
      </div>

      <div class="range-wrap" style="margin-top:10px">
        <label><i class="ph ph-map-pin"></i> <span data-i18n="search.distance">Distance</span>: <span id="distanceValue">10</span> km</label>
        <input type="range" id="distanceRange" min="1" max="50" value="10" class="touch-target">
      </div>

      <div style="margin-top:14px">
        <label><i class="ph ph-squares-four"></i> <span data-i18n="search.category">Category</span></label>
        <div class="filter-chips" id="categoryChips"></div>
      </div>

      <div class="range-wrap" style="margin-top:14px">
        <label><i class="ph ph-currency-inr"></i> <span data-i18n="search.dailyRate">Daily Rate</span>: ₹<span id="rateMin">200</span> - ₹<span id="rateMax">2000</span></label>
        <input type="range" id="rateMinInput" min="100" max="2500" value="200" step="50" class="touch-target">
        <input type="range" id="rateMaxInput" min="100" max="2500" value="2000" step="50" class="touch-target">
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px">
        <label><i class="ph ph-check-circle"></i> <span data-i18n="search.availableOnly">Available Only</span></label>
        <button id="availableToggle" class="toggle touch-target active"></button>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px">
        <label><i class="ph ph-star"></i> <span data-i18n="search.minRating">Min Rating</span></label>
        <select id="ratingInput" class="input" style="min-height:52px;max-width:150px">
          <option value="0">Any</option>
          <option value="3">3+</option>
          <option value="4" selected>4+</option>
          <option value="4.5">4.5+</option>
        </select>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1.4fr;gap:10px;margin-top:16px">
        <button class="btn btn-outline touch-target" id="clearFiltersBtn" data-i18n="search.clearAll">Clear All</button>
        <button class="btn btn-primary touch-target" id="applyFiltersBtn"><span data-i18n="search.showResults">Show Results</span></button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initCommonUI, categoryMeta, getCategoryLabel, renderWorkerCard, renderJobCard, renderSkeletonCards, showEmptyState, showToast, initBottomSheet, requestCityFromLocation, showSuccessOverlay, getText } from "./main.js";
    import { fetchWorkers, fetchJobs, createApplication } from "./appwrite.js";

    const resultsNode = document.getElementById("results");
    const locationBanner = document.getElementById("locationBanner");
    const categoryChips = document.getElementById("categoryChips");
    const applyFiltersBtn = document.getElementById("applyFiltersBtn");
    const quickCityInput = document.getElementById("quickCityInput");
    const quickCategoryInput = document.getElementById("quickCategoryInput");
    const quickRatingInput = document.getElementById("quickRatingInput");
    const quickAvailabilityInput = document.getElementById("quickAvailabilityInput");

    const params = new URLSearchParams(location.search);
    const paramMode = params.get("mode");

    const state = {
      mode: paramMode === "jobs" ? "jobs" : "workers",
      selectedCategory: params.get("category") || "",
      distance: Number(params.get("distance") || 10),
      rateMin: Number(params.get("rateMin") || 200),
      rateMax: Number(params.get("rateMax") || 2000),
      availableOnly: params.get("available") === "0" ? false : true,
      minRating: Number(params.get("minRating") || 4),
      city: params.get("city") || ""
    };

    let workers = [];
    let jobs = [];

    function buildCategoryChips() {
      categoryChips.innerHTML = Object.entries(categoryMeta).map(([key, value]) => {
        const activeClass = state.selectedCategory === key ? "active" : "";
        return `<button class="chip touch-target ${activeClass}" data-chip="${key}"><i class="${value.icon}"></i> ${getCategoryLabel(key)}</button>`;
      }).join("");

      quickCategoryInput.innerHTML = `<option value="">All categories</option>${Object.entries(categoryMeta)
        .map(([key, value]) => `<option value="${key}">${getCategoryLabel(key) || value.label}</option>`)
        .join("")}`;
      quickCategoryInput.value = state.selectedCategory;
    }

    function syncUrl() {
      const url = new URL(window.location.href);
      url.searchParams.set("mode", state.mode);
      if (state.city) url.searchParams.set("city", state.city);
      else url.searchParams.delete("city");
      if (state.selectedCategory) url.searchParams.set("category", state.selectedCategory);
      else url.searchParams.delete("category");
      url.searchParams.set("distance", String(state.distance));
      url.searchParams.set("rateMin", String(state.rateMin));
      url.searchParams.set("rateMax", String(state.rateMax));
      url.searchParams.set("minRating", String(state.minRating));
      url.searchParams.set("available", state.availableOnly ? "1" : "0");
      window.history.replaceState({}, "", url.toString());
    }

    function filteredWorkers() {
      return workers.filter((worker) => {
        if (state.selectedCategory && worker.category !== state.selectedCategory) {
          return false;
        }
        if (worker.distance > state.distance) {
          return false;
        }
        if (worker.rate < state.rateMin || worker.rate > state.rateMax) {
          return false;
        }
        if (state.availableOnly && !worker.available) {
          return false;
        }
        if (worker.rating < state.minRating) {
          return false;
        }
        return true;
      });
    }

    async function renderResults() {
      renderSkeletonCards(resultsNode, 3);
      setTimeout(async () => {
        if (state.mode === "workers") {
          const data = filteredWorkers();
          const showResultsText = await getText("search.showResults", "Show Results");
          applyFiltersBtn.textContent = `${showResultsText}: ${data.length}`;
          if (!data.length) {
            showEmptyState({
              container: resultsNode,
              title: await getText("search.noWorkers", "No workers found nearby"),
              message: await getText("search.tryExpand", "Try expanding your search radius"),
              buttonText: await getText("search.expandSearch", "Expand Search"),
              onAction: () => {
                state.distance = Math.min(50, state.distance + 10);
                document.getElementById("distanceRange").value = String(state.distance);
                document.getElementById("distanceValue").textContent = String(state.distance);
                renderResults();
              }
            });
            return;
          }
          resultsNode.innerHTML = data.map(renderWorkerCard).join("");
        } else {
          const showResultsText = await getText("search.showResults", "Show Results");
          applyFiltersBtn.textContent = `${showResultsText}: ${jobs.length}`;
          resultsNode.innerHTML = jobs.map(renderJobCard).join("");
          resultsNode.querySelectorAll("[data-job-apply]").forEach((button) => {
            button.addEventListener("click", async () => {
              const jobId = button.getAttribute("data-job-apply");
              const currentUser = await getCurrentUser();
              if (!currentUser) {
                showToast(await getText("search.loginToApply", "Please login to apply"), "warning");
                return;
              }
              const result = await createApplication(jobId, currentUser.$id);
              if (result) {
                showSuccessOverlay(await getText("search.appliedSuccess", "Applied Successfully!"));
                showToast(await getText("search.applicationSent", "Application sent to employer"), "success");
              } else {
                showToast(await getText("search.applyFailed", "Failed to apply. Try again."), "error");
              }
            });
          });
        }
      }, 420);
    }

    async function loadData() {
      renderSkeletonCards(resultsNode, 3);
      try {
        // Fetch workers and jobs from database
        workers = await fetchWorkers({ city: state.city });
        jobs = await fetchJobs({ city: state.city });
        
        if (!workers.length && !jobs.length) {
          showEmptyState({
            container: resultsNode,
            title: await getText("search.noData", "No data available yet"),
            message: await getText("search.noDataSub", "Workers and jobs will appear here soon"),
            iconClass: "ph ph-briefcase"
          });
          return;
        }
        
        renderResults();
      } catch (error) {
        console.error("Failed to load data:", error);
        showEmptyState({
          container: resultsNode,
          title: await getText("search.errorLoad", "Error loading data"),
          message: await getText("search.connectionCheck", "Please check your connection"),
          buttonText: await getText("common.retry", "Retry"),
          onAction: loadData
        });
      }
    }

    async function getCurrentUser() {
      try {
        const { account } = await import("./appwrite.js");
        return await account.get();
      } catch {
        return null;
      }
    }

    categoryChips.addEventListener("click", (event) => {
      const chip = event.target.closest("[data-chip]");
      if (!chip) {
        return;
      }
      state.selectedCategory = chip.dataset.chip;
      buildCategoryChips();
      renderResults();
    });

    document.getElementById("modeToggle").addEventListener("click", (event) => {
      const button = event.target.closest("button[data-mode]");
      if (!button) {
        return;
      }
      document.querySelectorAll("#modeToggle button").forEach((node) => node.classList.remove("active"));
      button.classList.add("active");
      state.mode = button.dataset.mode;
      syncUrl();
      renderResults();
    });

    document.getElementById("distanceRange").addEventListener("input", (event) => {
      state.distance = Number(event.target.value);
      document.getElementById("distanceValue").textContent = event.target.value;
      syncUrl();
      renderResults();
    });

    document.getElementById("rateMinInput").addEventListener("input", (event) => {
      state.rateMin = Number(event.target.value);
      if (state.rateMin > state.rateMax) {
        state.rateMax = state.rateMin;
        document.getElementById("rateMaxInput").value = String(state.rateMax);
      }
      document.getElementById("rateMin").textContent = String(state.rateMin);
      document.getElementById("rateMax").textContent = String(state.rateMax);
      syncUrl();
      renderResults();
    });

    document.getElementById("rateMaxInput").addEventListener("input", (event) => {
      state.rateMax = Number(event.target.value);
      if (state.rateMax < state.rateMin) {
        state.rateMin = state.rateMax;
        document.getElementById("rateMinInput").value = String(state.rateMin);
      }
      document.getElementById("rateMin").textContent = String(state.rateMin);
      document.getElementById("rateMax").textContent = String(state.rateMax);
      syncUrl();
      renderResults();
    });

    document.getElementById("availableToggle").addEventListener("click", (event) => {
      state.availableOnly = !state.availableOnly;
      event.currentTarget.classList.toggle("active", state.availableOnly);
      quickAvailabilityInput.value = state.availableOnly ? "available" : "all";
      syncUrl();
      renderResults();
    });

    document.getElementById("ratingInput").addEventListener("change", (event) => {
      state.minRating = Number(event.target.value);
      quickRatingInput.value = String(state.minRating);
      syncUrl();
      renderResults();
    });

    document.getElementById("quickApplyBtn").addEventListener("click", async () => {
      state.city = quickCityInput.value.trim();
      state.selectedCategory = quickCategoryInput.value;
      state.minRating = Number(quickRatingInput.value || 0);
      state.availableOnly = quickAvailabilityInput.value === "available";

      document.getElementById("ratingInput").value = String(state.minRating);
      document.getElementById("availableToggle").classList.toggle("active", state.availableOnly);
      buildCategoryChips();
      syncUrl();
      await loadData();
    });

    document.getElementById("clearFiltersBtn").addEventListener("click", () => {
      state.selectedCategory = "";
      state.distance = 10;
      state.rateMin = 200;
      state.rateMax = 2000;
      state.availableOnly = true;
      state.minRating = 4;
      state.city = "";
      document.getElementById("distanceRange").value = "10";
      document.getElementById("rateMinInput").value = "200";
      document.getElementById("rateMaxInput").value = "2000";
      document.getElementById("ratingInput").value = "4";
      document.getElementById("availableToggle").classList.add("active");
      document.getElementById("distanceValue").textContent = "10";
      document.getElementById("rateMin").textContent = "200";
      document.getElementById("rateMax").textContent = "2000";
      quickCityInput.value = "";
      quickCategoryInput.value = "";
      quickRatingInput.value = "4";
      quickAvailabilityInput.value = "available";
      buildCategoryChips();
      syncUrl();
      loadData();
      renderResults();
    });

    document.getElementById("allowLocationBtn").addEventListener("click", async () => {
      const city = await requestCityFromLocation();
      if (city) {
        state.city = city;
        locationBanner.remove();
        showToast(`${await getText("search.searchingNear", "Searching near")} ${city}`, "success");
        quickCityInput.value = city;
        syncUrl();
        await loadData();
      } else {
        showToast(await getText("search.offlineHint", "You seem to be offline. Check your connection."), "error");
      }
    });

    document.getElementById("enterCityBtn").addEventListener("click", () => {
      const city = prompt(localStorage.getItem("lang") === "hi" ? "अपना शहर लिखें" : "Enter your city");
      if (!city) {
        return;
      }
      state.city = city;
      locationBanner.remove();
      showToast(`${localStorage.getItem("lang") === "hi" ? "पास में खोज रहे हैं" : "Searching near"} ${city}`, "success");
      quickCityInput.value = city;
      syncUrl();
      loadData();
    });

    document.addEventListener("languageChanged", () => {
      buildCategoryChips();
      renderResults();
    });

    // Initialize
    if (state.mode === "jobs") {
      document.querySelectorAll("#modeToggle button").forEach((node) => node.classList.remove("active"));
      document.querySelector('#modeToggle button[data-mode="jobs"]')?.classList.add("active");
    }
    quickCityInput.value = state.city;
    quickRatingInput.value = String(state.minRating);
    quickAvailabilityInput.value = state.availableOnly ? "available" : "all";
    document.getElementById("distanceRange").value = String(state.distance);
    document.getElementById("distanceValue").textContent = String(state.distance);
    document.getElementById("rateMinInput").value = String(state.rateMin);
    document.getElementById("rateMaxInput").value = String(state.rateMax);
    document.getElementById("rateMin").textContent = String(state.rateMin);
    document.getElementById("rateMax").textContent = String(state.rateMax);
    document.getElementById("ratingInput").value = String(state.minRating);
    document.getElementById("availableToggle").classList.toggle("active", state.availableOnly);
    buildCategoryChips();
    syncUrl();
    loadData();
    initBottomSheet("#filterBtn", "#filterSheet", "#closeFilterBtn");
    initCommonUI();
  </script>
</body>
</html>
