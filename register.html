<!DOCTYPE html>
<html lang="en" class="page-enter">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - KaamConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Hind:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card" style="width:min(520px,100%);padding:24px">
      <div class="card auth-header-card" style="margin-bottom:14px;padding:16px">
        <h1 class="auth-logo" style="margin-bottom:8px"><i class="ph ph-toolbox"></i> KaamConnect</h1>
        <h2 class="auth-title" data-i18n="register.step1Title">Create your account</h2>
        <p class="auth-subtitle">Create your login now. Profile details are completed next.</p>
      </div>

      <div class="progress-wrap" style="margin-bottom:18px">
        <div class="progress-line"><div class="progress-fill" style="width:50%"></div></div>
        <small>Step 1 of 2</small>
      </div>

      <div class="tab-toggle" id="roleToggle" style="margin-bottom:18px">
        <button class="active touch-target" data-role="worker"><i class="ph ph-hard-hat"></i> Worker</button>
        <button class="touch-target" data-role="employer"><i class="ph ph-buildings"></i> Employer</button>
      </div>

      <div class="dashboard-grid" style="grid-template-columns:1fr">
        <div class="input-group">
          <label class="input-label" for="nameInput">Full Name</label>
          <input class="input" id="nameInput" autocomplete="name" placeholder="Your full name">
          <p class="field-error" id="nameError"></p>
        </div>

        <div class="input-group">
          <label class="input-label" for="emailInput">Email Address</label>
          <div class="input-row">
            <span class="input-icon"><i class="ph ph-envelope-simple"></i></span>
            <input class="input" id="emailInput" autocomplete="email" name="email" inputmode="email" placeholder="name@example.com" style="padding-left:54px">
          </div>
          <p class="field-error" id="emailError"></p>
        </div>

        <div class="input-group">
          <label class="input-label" for="passwordInput">Password</label>
          <div class="input-row">
            <span class="input-icon"><i class="ph ph-lock-key"></i></span>
            <input class="input" id="passwordInput" type="password" autocomplete="new-password" name="new-password" placeholder="At least 6 characters">
            <button type="button" class="input-action" id="showPasswordBtn">Show</button>
          </div>
          <p class="field-error" id="passwordError"></p>
        </div>

        <div class="input-group">
          <label class="input-label" for="confirmPasswordInput">Verify Password</label>
          <div class="input-row">
            <span class="input-icon"><i class="ph ph-lock-key"></i></span>
            <input class="input" id="confirmPasswordInput" type="password" autocomplete="new-password" placeholder="Repeat your password">
            <button type="button" class="input-action" id="showConfirmPasswordBtn">Show</button>
          </div>
          <p class="field-error" id="confirmPasswordError"></p>
        </div>
      </div>

      <div class="auth-actions" style="margin-top:16px">
        <button class="btn btn-primary touch-target" id="createAccountBtn"><i class="ph ph-user-plus"></i> Create Account</button>
        <button class="btn btn-outline touch-target" id="googleRegisterBtn"><i class="ph ph-globe"></i> Continue with Google</button>
      </div>

      <div class="auth-meta" style="margin-top:6px">
        <p>Already have an account?</p>
        <a href="login.html" style="font-weight:700;color:var(--secondary)">Login →</a>
      </div>
    </section>
  </main>

  <script type="module">
    import { initCommonUI, showToast, showLoading, hideLoading, showSuccessOverlay } from "./main.js";
    import { registerUser, loginWithGoogle } from "./auth.js";

    const roleToggle = document.getElementById("roleToggle");
    const nameInput = document.getElementById("nameInput");
    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const confirmPasswordInput = document.getElementById("confirmPasswordInput");
    const createAccountBtn = document.getElementById("createAccountBtn");
    const nameError = document.getElementById("nameError");
    const emailError = document.getElementById("emailError");
    const passwordError = document.getElementById("passwordError");
    const confirmPasswordError = document.getElementById("confirmPasswordError");
    const showPasswordBtn = document.getElementById("showPasswordBtn");
    const showConfirmPasswordBtn = document.getElementById("showConfirmPasswordBtn");
    const googleRegisterBtn = document.getElementById("googleRegisterBtn");

    let selectedRole = "worker";

    function setError(node, message) {
      node.textContent = message || "";
      node.classList.toggle("visible", Boolean(message));
    }

    function clearErrors() {
      [nameError, emailError, passwordError, confirmPasswordError].forEach((node) => setError(node, ""));
    }

    function syncGoogleRedirect() {
      localStorage.setItem("signupRole", selectedRole);
    }

    roleToggle.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-role]");
      if (!button) return;
      roleToggle.querySelectorAll("button").forEach((node) => node.classList.remove("active"));
      button.classList.add("active");
      selectedRole = button.dataset.role;
      syncGoogleRedirect();
    });

    showPasswordBtn.addEventListener("click", () => {
      const visible = passwordInput.type === "text";
      passwordInput.type = visible ? "password" : "text";
      showPasswordBtn.textContent = visible ? "Show" : "Hide";
    });

    showConfirmPasswordBtn.addEventListener("click", () => {
      const visible = confirmPasswordInput.type === "text";
      confirmPasswordInput.type = visible ? "password" : "text";
      showConfirmPasswordBtn.textContent = visible ? "Show" : "Hide";
    });

    createAccountBtn.addEventListener("click", async () => {
      clearErrors();
      const name = nameInput.value.trim();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      let hasError = false;
      if (name.length < 2) {
        setError(nameError, "Please enter your full name");
        hasError = true;
      }
      if (!/^\S+@\S+\.\S+$/.test(email)) {
        setError(emailError, "Please enter a valid email address");
        hasError = true;
      }
      if (password.length < 6) {
        setError(passwordError, "Password should be at least 6 characters");
        hasError = true;
      }
      if (confirmPassword !== password) {
        setError(confirmPasswordError, "Passwords do not match");
        hasError = true;
      }
      if (!selectedRole) {
        showToast("Please choose who you are", "warning");
        hasError = true;
      }

      if (hasError) return;

      showLoading("Creating your account...");
      const result = await registerUser({
        role: selectedRole,
        name,
        email,
        password
      });
      hideLoading();

      if (!result.ok) {
        setError(emailError, result.errors?.email || "");
        setError(passwordError, result.errors?.password || "");
        showToast("Please fix highlighted details.", "warning");
        return;
      }

      localStorage.setItem("signupRole", selectedRole);
      showSuccessOverlay("Account Created!");
      setTimeout(() => {
        window.location.href = `quick-setup.html?role=${encodeURIComponent(selectedRole)}`;
      }, 1100);
    });

    googleRegisterBtn.addEventListener("click", async () => {
      try {
        syncGoogleRedirect();
        const target = `quick-setup.html?role=${encodeURIComponent(selectedRole)}`;
        const successUrl = new URL(target, window.location.href).toString();
        const failureUrl = new URL("register.html", window.location.href).toString();
        await loginWithGoogle(successUrl, failureUrl);
      } catch {
        showToast("Google sign-in could not start. Please try again.", "error");
      }
    });

    const params = new URLSearchParams(window.location.search);
    const roleParam = params.get("role");
    if (roleParam && ["worker", "employer"].includes(roleParam)) {
      const roleCard = document.querySelector(`[data-role="${roleParam}"]`);
      roleCard?.click();
    } else {
      syncGoogleRedirect();
    }

    initCommonUI();
  </script>
</body>
</html>
